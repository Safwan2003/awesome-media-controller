name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests + schema lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install gjs and glib tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gjs libglib2.0-bin

      - name: Run unit tests
        run: gjs -m tests/test-theme.js

      - name: Validate GSettings schema
        run: glib-compile-schemas --strict --dry-run schemas/

      - name: Check metadata.json is valid JSON
        run: gjs -c "JSON.parse(imports.gi.GLib.file_get_contents('metadata.json')[1].toString()); print('metadata.json OK')"
